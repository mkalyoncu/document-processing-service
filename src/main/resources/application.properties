spring.application.name=document-processing-service

# ===============================
# SERVER
# ===============================
server.port=8080

# ===============================
# DATASOURCE
# ===============================
spring.datasource.url=jdbc:postgresql://localhost:5432/docdb
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ===============================
# JPA / HIBERNATE
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# FLYWAY
# ===============================
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# ===============================
# JACKSON
# ===============================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=non_null

# ===============================
# ACTUATOR
# ===============================
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# ===============================
# SPRINGDOC / SWAGGER
# ===============================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ===============================
# DMS CONFIG
# ===============================
dms.base-url=${DMS_BASE_URL:https://dms.example.com/api/v1}
dms.api-key=${DMS_API_KEY:simulated-api-key-for-dev}
dms.connect-timeout-ms=5000
dms.read-timeout-ms=30000

# ===============================
# SIMULATION CONFIG
# ===============================
simulation.dms.min-delay-ms=500
simulation.dms.max-delay-ms=2000
simulation.dms.failure-rate=0.10

simulation.ocr.min-delay-ms=2000
simulation.ocr.max-delay-ms=8000
simulation.ocr.failure-rate=0.20

simulation.classifier.min-delay-ms=1000
simulation.classifier.max-delay-ms=4000
simulation.classifier.failure-rate=0.15

simulation.ner.min-delay-ms=2000
simulation.ner.max-delay-ms=6000
simulation.ner.failure-rate=0.25

max.retry.count=3